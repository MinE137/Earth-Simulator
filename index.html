<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합형 고체 지구 시뮬레이터</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --bg: #f4f7f6;
        }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 1rem; text-align: center; }
        
        main { display: flex; flex: 1; overflow: hidden; gap: 10px; padding: 10px; }
        
        /* 좌측 조작 패널 */
        #panel { width: 300px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-y: auto; }
        .control-group { border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 0.85rem; margin-top: 8px; font-weight: bold; }
        input, select { width: 100%; margin-top: 4px; padding: 5px; box-sizing: border-box; }

        /* 중앙 및 우측 영역 */
        #content { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        #visual-section { height: 40%; background: white; border-radius: 8px; padding: 10px; position: relative; }
        #tab-section { flex: 1; background: white; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        
        .tabs { display: flex; background: #eee; }
        .tab-btn { flex: 1; border: none; padding: 10px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: white; font-weight: bold; border-bottom: 3px solid var(--accent); }
        .tab-content { display: none; flex: 1; padding: 15px; overflow-y: auto; }
        .tab-content.active { display: block; }

        canvas { width: 100% !important; height: 100% !important; }
        .data-card { background: #f8f9fa; border-left: 4px solid var(--accent); padding: 10px; margin-top: 10px; font-size: 0.9rem; line-height: 1.5; }
        .eq-box { font-family: 'Times New Roman', serif; background: #eef; padding: 5px; border-radius: 4px; display: block; margin: 5px 0; }
    </style>
</head>
<body>

<header>
    <h1>통합형 고체 지구 시뮬레이터</h1>
</header>

<main>
    <aside id="panel">
        <div class="control-group">
            <h3>프리셋 설정</h3>
            <button onclick="applyPreset('mountain')">산맥 압축대</button>
            <button onclick="applyPreset('rift')">열곡 인장대</button>
        </div>

        <div class="control-group">
            <h3>매질 및 지형</h3>
            <label>1층 암석</label>
            <select id="rock1" onchange="updateState()">
                <option value="granite" selected>화강암 (ρ=2.7)</option>
                <option value="sandstone">사암 (ρ=2.3)</option>
                <option value="water">물 (ρ=1.0, μ=0)</option>
            </select>
            <label>고도 (h, km)</label>
            <input type="range" id="elevation" min="-2" max="5" step="0.1" value="1" oninput="updateState()">
            <span id="elev-val">1 km</span>
        </div>

        <div class="control-group">
            <h3>응력 조건</h3>
            <label>최대 주응력 (σ1, MPa)</label>
            <input type="number" id="sigma1" value="40" onchange="updateState()">
            <label>최소 주응력 (σ3, MPa)</label>
            <input type="number" id="sigma3" value="10" onchange="updateState()">
            <label>점착력 (C, MPa)</label>
            <input type="number" id="cohesion" value="5" onchange="updateState()">
        </div>

        <div class="control-group">
            <h3>요약</h3>
            <div id="summary-card" class="data-card">데이터를 계산 중입니다...</div>
        </div>
    </aside>

    <div id="content">
        <section id="visual-section">
            <canvas id="crossSectionChart"></canvas>
        </section>

        <section id="tab-section">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'tab-stress')">응력·모어원</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-seismic')">지진파·주시곡선</button>
                <button class="tab-btn" onclick="openTab(event, 'tab-gravity')">중력·지각평형</button>
            </div>

            <div id="tab-stress" class="tab-content active">
                <h4>Mohr 원 및 파괴 분석</h4>
                <div style="height: 250px;"><canvas id="mohrChart"></canvas></div>
                <div class="data-card">
                    <span class="eq-box">τ = C + σn tanφ</span>
                    <p id="stress-analysis">상태 분석 중...</p>
                </div>
            </div>

            <div id="tab-seismic" class="tab-content">
                <h4>주시곡선 (Travel-time Curve)</h4>
                <div style="height: 250px;"><canvas id="travelTimeChart"></canvas></div>
                <div class="data-card">
                    <span class="eq-box">Vp = √((K+4μ/3)/ρ), Vs = √(μ/ρ)</span>
                    <p id="seismic-data"></p>
                </div>
            </div>

            <div id="tab-gravity" class="tab-content">
                <h4>중력 이상 및 지각 뿌리</h4>
                <div style="height: 250px;"><canvas id="gravityChart"></canvas></div>
                <div class="data-card">
                    <span class="eq-box">FAC = 0.3086h, BC = 0.0419ρh</span>
                    <p id="isostasy-data"></p>
                </div>
            </div>
        </section>
    </div>
</main>

<script>
    // --- 상수 및 데이터 매핑 ---
    const ROCKS = {
        granite: { rho: 2.7, K: 50, mu: 30, phi: 30, cohesion: 10 },
        sandstone: { rho: 2.3, K: 20, mu: 10, phi: 25, cohesion: 5 },
        water: { rho: 1.0, K: 2.2, mu: 0, phi: 0, cohesion: 0 },
        mantle: { rho: 3.3, K: 100, mu: 60, phi: 40, cohesion: 20 }
    };

    let state = {
        h: 1,
        rock1: ROCKS.granite,
        rock2: ROCKS.mantle,
        sigma1: 60,
        sigma3: 20,
        cohesion: 10,
        crustThickness: 30
    };

    // --- 차트 객체 저장 변수 ---
    let charts = {};

    function init() {
        createCharts();
        updateState();
    }

    function updateState() {
        state.h = parseFloat(document.getElementById('elevation').value);
        state.rock1 = ROCKS[document.getElementById('rock1').value];
        state.sigma1 = parseFloat(document.getElementById('sigma1').value);
        state.sigma3 = parseFloat(document.getElementById('sigma3').value);
        state.cohesion = parseFloat(document.getElementById('cohesion').value);
        
        document.getElementById('elev-val').innerText = state.h + " km";
        
        calculatePhysics();
    }

    function calculatePhysics() {
        // 1. 지진파 속도 계산 (K, mu: GPa, rho: g/cm^3 -> km/s)
        const Vp = Math.sqrt((state.rock1.K + (4/3)*state.rock1.mu) / state.rock1.rho);
        const Vs = state.rock1.mu === 0 ? 0 : Math.sqrt(state.rock1.mu / state.rock1.rho);
        const Vp_mantle = Math.sqrt((ROCKS.mantle.K + (4/3)*ROCKS.mantle.mu) / ROCKS.mantle.rho);

        // 2. 지각 평형 (Airy 모델)
        const root = (state.h * state.rock1.rho) / (ROCKS.mantle.rho - state.rock1.rho);
        const h_total = state.crustThickness + root; // 현재 위치의 지각 두께

        // 3. 지진파 임계각 및 주요 거리
        const sin_ic = Vp / Vp_mantle;
        const ic = Math.asin(sin_ic);
        const Xc = 2 * state.crustThickness * Math.tan(ic); // 임계 거리
        const Xcr = 2 * state.crustThickness * Math.sqrt((Vp_mantle + Vp) / (Vp_mantle - Vp)); // 교차 거리
        const t1 = (2 * state.crustThickness * Math.cos(ic)) / Vp; // 시간 절편

        // 4. 중력 이상 (수업 자료 p.29 모델)
        // 산맥 중심부 부게 이상 = 지각 뿌리에 의한 결손
        const bouguer = -0.0419 * (ROCKS.mantle.rho - state.rock1.rho) * root * 1000;
        // 프리에어 이상 (산맥 중앙부에서는 고도차에 의한 중력 증가가 뿌리에 의한 감소보다 큼)
        const freeAir = 0.3086 * state.h * 1000 - 0.0419 * state.rock1.rho * state.h * 1000 + bouguer;

        updateUI(Vp, Vs, Vp_mantle, root, h_total, ic, Xc, Xcr, t1, freeAir, bouguer);
    }

    function updateUI(Vp, Vs, Vp2, root, h_total, ic, Xc, Xcr, t1, freeAir, bouguer) {
        // 요약 카드 업데이트
        const center = (state.sigma1 + state.sigma3) / 2;
        const radius = (state.sigma1 - state.sigma3) / 2;
        const phiRad = state.rock1.phi * Math.PI / 180;
        // 점(center, 0)에서 직선 tau = cohesion + sigma_n * tan(phi) 까지의 거리
        // 직선 방정식: tan(phi)*sigma_n - tau + cohesion = 0
        const distToEnvelope = Math.abs(Math.tan(phiRad) * center + state.cohesion) / Math.sqrt(Math.pow(Math.tan(phiRad), 2) + 1);
        const isBroken = radius >= distToEnvelope;

        document.getElementById('summary-card').innerHTML = `
            <b>실시간 분석 결과:</b><br>
            - P파/S파 속도: ${Vp.toFixed(2)} / ${Vs.toFixed(2)} km/s<br>
            - 지각 뿌리 깊이: ${root.toFixed(2)} km<br>
            - 교차 거리(Xcr): ${Xcr.toFixed(1)} km<br>
            - 상태: ${isBroken ? '<span style="color:red; font-weight:bold;">파괴/단층 발생</span>' : '안정 (탄성 변형)'}
        `;

        // 상세 탭 텍스트 업데이트
        document.getElementById('stress-analysis').innerText = `최대 주응력 ${state.sigma1}MPa, 최소 주응력 ${state.sigma3}MPa. ` + 
            (isBroken ? "응력이 파괴 포락선에 도달하여 단층이 형성되었습니다." : "현재 응력 상태는 암석의 강도 범위 내에 있습니다.");
        
        document.getElementById('seismic-data').innerText = `임계각: ${(ic * 180 / Math.PI).toFixed(1)}°, 시간 절편(t1): ${t1.toFixed(2)}s. ` +
            `교차 거리(${Xcr.toFixed(1)}km) 이후부터 굴절파(Pn)가 직접파보다 먼저 도착합니다.`;

        document.getElementById('isostasy-data').innerText = `지상 고도: ${state.h}km, 지각 뿌리: ${root.toFixed(2)}km. ` +
            `산맥 중심 프리에어 이상: ${freeAir.toFixed(1)} mGal, 부게 이상: ${bouguer.toFixed(1)} mGal.`;

        // 1. 모어 원 업데이트
        const mohrPoints = [];
        for(let a=0; a<=Math.PI; a+=0.1) {
            mohrPoints.push({x: center + radius*Math.cos(a), y: radius*Math.sin(a)});
        }
        charts.mohr.data.datasets[0].data = mohrPoints;
        charts.mohr.data.datasets[1].data = [{x: 0, y: state.cohesion}, {x: 100, y: state.cohesion + 100 * Math.tan(phiRad)}];
        charts.mohr.update();

        // 2. 주시곡선 업데이트
        const distances = Array.from({length: 41}, (_, i) => i * 10);
        const tDirect = distances.map(d => d / Vp);
        const tReflected = distances.map(d => Math.sqrt(Math.pow(2 * state.crustThickness, 2) + d*d) / Vp);
        const tRefracted = distances.map(d => {
            if (d < Xc) return null;
            return d / Vp2 + t1;
        });
        
        charts.travel.data.labels = distances;
        charts.travel.data.datasets[0].data = tDirect;
        charts.travel.data.datasets[1].data = tRefracted;
        charts.travel.data.datasets[2].data = tReflected;
        charts.travel.update();

        // 3. 중력 이상 차트 업데이트
        const gravityDistances = Array.from({length: 21}, (_, i) => (i - 10) * 10);
        const faData = gravityDistances.map(d => freeAir * Math.exp(-(d*d)/1000));
        const bgData = gravityDistances.map(d => bouguer * Math.exp(-(d*d)/1500)); // 뿌리는 더 넓게 분포
        charts.gravity.data.datasets[0].data = faData;
        charts.gravity.data.datasets[1].data = bgData;
        charts.gravity.update();

        // 4. 지질 단면도 업데이트
        const sectionWidth = 100;
        const mountainWidth = 40;
        const profile = [];
        const rootProfile = [];
        for(let x=0; x<=sectionWidth; x+=2) {
            const localH = state.h * Math.exp(-Math.pow(x - 50, 2) / (2 * Math.pow(mountainWidth/2.5, 2)));
            const localRoot = root * Math.exp(-Math.pow(x - 50, 2) / (2 * Math.pow(mountainWidth/1.5, 2)));
            profile.push({x: x, y: localH});
            rootProfile.push({x: x, y: -(state.crustThickness + localRoot)});
        }

        charts.section.data.datasets[0].data = [{x:0, y:0}, {x:100, y:0}];
        charts.section.data.datasets[1].data = [...profile, ...[...rootProfile].reverse(), profile[0]];
        charts.section.data.datasets[2].data = [...rootProfile, {x: 100, y: -60}, {x: 0, y: -60}, rootProfile[0]];
        charts.section.update();
    }

    function createCharts() {
        // 모어 원 차트
        charts.mohr = new Chart(document.getElementById('mohrChart'), {
            type: 'scatter',
            data: {
                datasets: [
                    { label: '모어 원 (Mohr Circle)', data: [], borderColor: 'red', showLine: true, fill: false },
                    { label: '파괴 포락선 (Failure Envelope)', data: [], borderColor: 'black', borderDash: [5,5], showLine: true, fill: false }
                ]
            },
            options: { 
                maintainAspectRatio: false,
                scales: { 
                    x: { min: 0, max: 100, title: {display:true, text:'수직 응력 (σn, MPa)'} }, 
                    y: { min: 0, max: 50, title: {display:true, text:'전단 응력 (τ, MPa)'} } 
                } 
            }
        });

        // 주시곡선 차트
        charts.travel = new Chart(document.getElementById('travelTimeChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: '직접파 (P)', data: [], borderColor: 'blue', fill: false, tension: 0 },
                    { label: '굴절파 (Pn)', data: [], borderColor: 'green', fill: false, tension: 0 },
                    { label: '반사파 (Reflection)', data: [], borderColor: 'orange', borderDash: [3,3], fill: false, tension: 0.1 }
                ]
            },
            options: { 
                maintainAspectRatio: false,
                scales: { 
                    x: { title: {display:true, text:'거리 (km)'} }, 
                    y: { title: {display:true, text:'시간 (s)'} } 
                } 
            }
        });

    // 중력 이상 차트
    charts.gravity = new Chart(document.getElementById('gravityChart'), {
        type: 'line',
        data: {
            labels: Array.from({length: 21}, (_, i) => (i - 10) * 10),
            datasets: [
                { label: '프리에어 이상', data: [], borderColor: 'orange', fill: false },
                { label: '부게 이상', data: [], borderColor: 'purple', fill: false }
            ]
        },
        options: {
            maintainAspectRatio: false,
            scales: {
                x: { title: {display:true, text:'거리 (km)'} },
                y: { title: {display:true, text:'중력 이상 (mGal)'} }
            }
        }
    });

    // 지질 단면도
    charts.section = new Chart(document.getElementById('crossSectionChart'), {
        type: 'scatter',
        data: {
            datasets: [
                { label: '지표면/해수면', data: [], borderColor: 'blue', showLine: true, fill: false, pointRadius: 0 },
                { label: '지각(Crust)', data: [], backgroundColor: 'rgba(139,69,19,0.5)', fill: true, showLine: true, pointRadius: 0 },
                { label: '맨틀(Mantle)', data: [], backgroundColor: 'rgba(255,165,0,0.2)', fill: true, showLine: true, pointRadius: 0 }
            ]
        },
        options: { 
            maintainAspectRatio: false,
            scales: { 
                x: { min: 0, max: 100, title: {display:true, text:'수평 거리 (km)'} }, 
                y: { min: -60, max: 10, title: {display:true, text:'깊이 (km)'} } 
            },
            plugins: {
                legend: { position: 'top' }
            }
        }
    });
}

    function openTab(evt, tabName) {
        const contents = document.getElementsByClassName("tab-content");
        for (let content of contents) content.classList.remove("active");
        const btns = document.getElementsByClassName("tab-btn");
        for (let btn of btns) btn.classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function applyPreset(type) {
        if(type === 'mountain') {
            document.getElementById('elevation').value = 3;
            document.getElementById('sigma1').value = 80;
            document.getElementById('sigma3').value = 20;
            document.getElementById('rock1').value = 'granite';
        } else if(type === 'rift') {
            document.getElementById('elevation').value = -1;
            document.getElementById('sigma1').value = 20;
            document.getElementById('sigma3').value = 5;
            document.getElementById('rock1').value = 'sandstone';
        }
        updateState();
    }

    window.onload = init;
</script>
</body>
</html>
